name: Daily job pull

# Pulls fresh jobs, scores/tiers them, and writes them into the Google Sheets tracker.
# Also refreshes the Networking Tracker tab from Gmail (best-effort).

on:
  schedule:
    - cron: "0 14 * * 5"   # 14:00 UTC every Friday (~22:00 SGT Fri night)
  workflow_dispatch: {}     # allow manual runs from the Actions tab

concurrency:
  group: daily-jobs
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test before external integrations
        run: python -m pytest -q

      - name: Pull jobs into the sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          APPLICANT_NAME: ${{ secrets.APPLICANT_NAME }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
          APPLICANT_LINKEDIN: ${{ secrets.APPLICANT_LINKEDIN }}
          RESUME_URL: ${{ secrets.RESUME_URL }}
          RESUME_SUMMARY: ${{ secrets.RESUME_SUMMARY }}
          # Telegram digest of new roles to apply for.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Scheduled CI is always dry-run. application.yml only prepares and reviews packages;
          # approving, autofilling the browser, and submitting are manual, local-only steps.
          AUTO_APPLY_LIVE: "false"
          AUTO_APPLY_BROWSER: "false"
        run: python runner.py

      - name: Match LinkedIn feed posts to tracked vacancies
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          APPLICANT_NAME: ${{ secrets.APPLICANT_NAME }}
          NETWORKING_APPLICANT_PROOF: ${{ secrets.NETWORKING_APPLICANT_PROOF }}
          NETWORKING_RELEVANCE: ${{ secrets.NETWORKING_RELEVANCE }}
        run: >-
          python -m linkedin_post_cli --max-jobs 5 --max-posts 5
          --posted-limit week --output data/linkedin_post_matches.md

      - name: Refresh networking contacts from Gmail
        continue-on-error: true   # missing Gmail creds shouldn't fail the job pull
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          APPLICANT_EMAIL: ${{ secrets.APPLICANT_EMAIL }}
        run: python scrape_network.py

      - name: Upload new-roles JSON feed
        if: always() && hashFiles('data/new_roles.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: new-roles
          path: data/new_roles.json

      - name: Upload LinkedIn post-match review packet
        if: always() && hashFiles('data/linkedin_post_matches.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-post-matches
          path: data/linkedin_post_matches.md
          retention-days: 14

      - name: Upload outreach draft fallback queue
        if: always() && hashFiles('data/outreach_drafts.jsonl') != ''
        uses: actions/upload-artifact@v4
        with:
          name: outreach-drafts
          path: data/outreach_drafts.jsonl
          retention-days: 14
